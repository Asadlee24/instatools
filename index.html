<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INSTA SCAN AI — Powered by ASAD LEE</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <link href='https://cdn.jsdelivr.net/npm/boxicons@2.0.5/css/boxicons.min.css' rel='stylesheet'>

    <style>
        :root {
            --primary: #22d3ee;
            --secondary: #e91e63;
            --bg: #03070b;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(34, 211, 238, 0.15);
            --font-header: 'Orbitron', sans-serif;
            --font-body: 'Rajdhani', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        body { 
            background: var(--bg); 
            color: #f8fafc; 
            font-family: var(--font-body); 
            overflow-x: hidden;
            perspective: 1000px;
        }

        /* Animated Cyber Grid */
        body::before {
            content: "";
            position: fixed; inset: 0; z-index: -1;
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.15;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            from { background-position: 0 0; }
            to { background-position: 0 40px; }
        }

        .tilt-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 25px;
            backdrop-filter: blur(12px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: fadeUp 0.8s ease both;
        }

        .tilt-card:hover {
            transform: translateY(-10px) rotateX(4deg) rotateY(-4deg);
            border-color: var(--primary);
            box-shadow: 0 15px 40px rgba(34, 211, 238, 0.15);
        }

        .glitch-text {
            font-family: var(--font-header);
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary) 0%, #fff 50%, #1e293b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .cyber-button {
            background: var(--primary);
            color: #000;
            font-family: var(--font-header);
            font-weight: 700;
            border: none;
            border-radius: 12px;
            padding: 14px 28px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.3);
        }

        .cyber-button:hover {
            box-shadow: 0 0 25px var(--primary);
            transform: scale(1.05);
        }

        .skill-badge {
            background: rgba(34, 211, 238, 0.1);
            border: 1px solid var(--border);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            margin: 4px;
            display: inline-block;
        }

        @keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
        @keyframes spin { to{transform:rotate(360deg)} }

        .profile-img {
            width: 120px; height: 120px;
            border-radius: 3rem;
            border: 3px solid var(--border);
            object-fit: cover;
            transition: 0.5s;
        }
        .profile-img:hover { border-color: var(--primary); transform: rotate(3deg); }

        .social-link {
            color: #94a3b8;
            font-size: 24px;
            transition: 0.3s;
            text-decoration: none;
        }
        .social-link:hover { color: var(--primary); transform: translateY(-3px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [username, setUsername] = useState("");
            const [loading, setLoading] = useState(false);
            const [data, setData] = useState(null);

            const analyze = () => {
                if(!username) return;
                setLoading(true);
                // Simulation of scanning
                setTimeout(() => {
                    setData({
                        username: username.toLowerCase(),
                        followers: "15.4K",
                        engagement: "4.2%",
                        score: 88,
                        quality: "High Quality"
                    });
                    setLoading(false);
                }, 1500);
            };

            return (
                <div style={{ maxWidth: "900px", margin: "0 auto", padding: "60px 20px" }}>
                    
                    {/* Hero Section */}
                    <header style={{ textAlign: 'center', marginBottom: '60px' }}>
                        <h1 className="glitch-text" style={{ fontSize: 'clamp(2.5rem, 8vw, 4rem)', letterSpacing: '4px' }}>INSTA SCAN AI</h1>
                        <p style={{ color: 'var(--primary)', letterSpacing: '3px', fontSize: '12px', marginTop: '10px' }}>ADVANCED ANALYTICS BY ASAD LEE</p>
                    </header>

                    {/* Search Area */}
                    <div className="tilt-card" style={{ marginBottom: '40px', display: 'flex', gap: '15px', alignItems: 'center' }}>
                        <i class='bx bx-at' style={{ fontSize: '24px', color: 'var(--primary)' }}></i>
                        <input 
                            type="text" 
                            placeholder="Enter Instagram Username..."
                            value={username}
                            onChange={(e) => setUsername(e.target.value)}
                            style={{ flex: 1, background: 'transparent', border: 'none', color: '#fff', fontSize: '18px', fontFamily: 'var(--font-body)' }}
                        />
                        <button className="cyber-button" onClick={analyze}>
                            {loading ? "Scanning..." : "Analyze"}
                        </button>
                    </div>

                    {/* Results Simulation */}
                    {data && (
                        <div className="tilt-card" style={{ marginBottom: '60px', textAlign: 'center' }}>
                            <h2 style={{ color: var('--primary'), marginBottom: '10px' }}>@{data.username}</h2>
                            <div style={{ display: 'flex', justify: 'center', gap: '40px', marginTop: '20px' }}>
                                <div><p style={{ fontSize: '24px', fontWeight: 'bold' }}>{data.followers}</p><span style={{ fontSize: '10px', color: '#555' }}>FOLLOWERS</span></div>
                                <div><p style={{ fontSize: '24px', fontWeight: 'bold', color: '#00e676' }}>{data.score}</p><span style={{ fontSize: '10px', color: '#555' }}>TRUST SCORE</span></div>
                            </div>
                        </div>
                    )}

                    {/* =========================================
                        ASAD LEE'S 3D PORTFOLIO SECTION
                    ========================================= */}
                    <div className="portfolio-section" style={{ marginTop: '100px' }}>
                        <div className="tilt-card" style={{ padding: '50px 30px' }}>
                            <div style={{ display: 'grid', mdGridTemplateColumns: '1fr 2fr', gridTemplateColumns: '1fr', gap: '40px', alignItems: 'center' }}>
                                
                                {/* Image & Socials */}
                                <div style={{ textAlign: 'center' }}>
                                    <img src="https://i.ibb.co/G3fvMHZY/IMG-4886.jpg" alt="Asad Lee" className="profile-img" />
                                    <div style={{ display: 'flex', justifyContent: 'center', gap: '20px', marginTop: '20px' }}>
                                        <a href="https://x.com/asadleo416?s=21" target="_blank" className="social-link"><i class='bx bxl-twitter'></i></a>
                                        <a href="https://www.instagram.com/asadlee24" target="_blank" className="social-link"><i class='bx bxl-instagram'></i></a>
                                        <a href="https://www.linkedin.com/in/asad-ali-3355273ba" target="_blank" className="social-link"><i class='bx bxl-linkedin'></i></a>
                                        <a href="https://wa.me/923400194591" target="_blank" className="social-link"><i class='bx bxl-whatsapp'></i></a>
                                    </div>
                                </div>

                                {/* Content */}
                                <div style={{ textAlign: 'left' }}>
                                    <h2 className="glitch-text" style={{ fontSize: '28px', marginBottom: '15px' }}>Asad Lee</h2>
                                    <p style={{ color: '#94a3b8', lineHeight: '1.7', marginBottom: '20px' }}>
                                        Cyber Security Researcher at **IMSciences Peshawar** and Full-Stack Developer. I specialize in building high-performance 3D web architectures and secure e-commerce systems.
                                    </p>
                                    
                                    <div style={{ marginBottom: '25px' }}>
                                        <span className="skill-badge">Cyber Security</span>
                                        <span className="skill-badge">React & Next.js</span>
                                        <span className="skill-badge">Web3 / DeFi</span>
                                        <span className="skill-badge">Shopify Expert</span>
                                    </div>

                                    {/* Project Links */}
                                    <h4 style={{ fontSize: '12px', color: 'var(--primary)', letterSpacing: '2px', marginBottom: '10px' }}>FEATURED PROJECTS</h4>
                                    <div style={{ display: 'flex', gap: '15px', flexWrap: 'wrap' }}>
                                        <a href="https://mdkelectronics.com" target="_blank" style={{ color: '#fff', textDecoration: 'none', fontSize: '14px', borderBottom: '1px solid #333' }}>MDK Electronics</a>
                                        <a href="https://horia-electronics.myshopify.com/" target="_blank" style={{ color: '#fff', textDecoration: 'none', fontSize: '14px', borderBottom: '1px solid #333' }}>Horia Electronics</a>
                                        <a href="https://asad-lee-portfolio.vercel.app/" target="_blank" style={{ color: 'var(--primary)', textDecoration: 'none', fontSize: '14px', fontWeight: 'bold' }}>View Full Portfolio →</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <footer style={{ textAlign: 'center', marginTop: '60px', fontSize: '10px', color: '#444', letterSpacing: '2px' }}>
                        © 2026 DEVELOPED BY ASAD LEE | PESHAWAR, PAKISTAN
                    </footer>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
