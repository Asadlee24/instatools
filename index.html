<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INSTA SCAN AI — Powered by ASAD LEE</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <link href='https://cdn.jsdelivr.net/npm/boxicons@2.0.5/css/boxicons.min.css' rel='stylesheet'>

    <style>
        :root {
            --primary: #22d3ee;
            --secondary: #e91e63;
            --bg: #03070b;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(34, 211, 238, 0.15);
            --font-header: 'Orbitron', sans-serif;
            --font-body: 'Rajdhani', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        body { 
            background: var(--bg); 
            color: #f8fafc; 
            font-family: var(--font-body); 
            overflow-x: hidden;
            perspective: 1000px;
        }

        /* Animated Cyber Grid */
        body::before {
            content: "";
            position: fixed; inset: 0; z-index: -1;
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.15;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            from { background-position: 0 0; }
            to { background-position: 0 40px; }
        }

        .tilt-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 25px;
            backdrop-filter: blur(12px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: fadeUp 0.8s ease both;
        }

        .tilt-card:hover {
            transform: translateY(-10px) rotateX(4deg) rotateY(-4deg);
            border-color: var(--primary);
            box-shadow: 0 15px 40px rgba(34, 211, 238, 0.15);
        }

        .glitch-text {
            font-family: var(--font-header);
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary) 0%, #fff 50%, #1e293b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .cyber-button {
            background: var(--primary);
            color: #000;
            font-family: var(--font-header);
            font-weight: 700;
            border: none;
            border-radius: 12px;
            padding: 14px 28px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.3);
        }

        .cyber-button:hover {
            box-shadow: 0 0 25px var(--primary);
            transform: scale(1.05);
        }

        .skill-badge {
            background: rgba(34, 211, 238, 0.1);
            border: 1px solid var(--border);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            margin: 4px;
            display: inline-block;
        }

        @keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
        @keyframes spin { to{transform:rotate(360deg)} }

        .profile-img {
            width: 120px; height: 120px;
            border-radius: 3rem;
            border: 3px solid var(--border);
            object-fit: cover;
            transition: 0.5s;
        }
        .profile-img:hover { border-color: var(--primary); transform: rotate(3deg); }

        .social-link {
            color: #94a3b8;
            font-size: 24px;
            transition: 0.3s;
            text-decoration: none;
        }
        .social-link:hover { color: var(--primary); transform: translateY(-3px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [username, setUsername] = useState("");
            const [loading, setLoading] = useState(false);
            const [data, setData] = useState(null);
            const [error, setError] = useState("");

            const analyze = async () => {
                if (!username.trim()) return;
                setLoading(true);
                setError("");
                setData(null);

                try {
                    const res = await fetch(`http://localhost:5000/analyze/${username.trim().toLowerCase()}`);
                    const json = await res.json();

                    if (!res.ok) {
                        throw new Error(json.error || "Server error");
                    }

                    setData(json.audit_data);
                } catch (err) {
                    setError(err.message || "Unable to fetch real data.");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div style={{ maxWidth: "900px", margin: "0 auto", padding: "60px 20px" }}>
                    {/* Hero Section */}
                    <header style={{ textAlign: 'center', marginBottom: '60px' }}>
                        <h1 className="glitch-text" style={{ fontSize: 'clamp(2.5rem, 8vw, 4rem)', letterSpacing: '4px' }}>INSTA SCAN AI</h1>
                        <p style={{ color: 'var(--primary)', letterSpacing: '3px', fontSize: '12px', marginTop: '10px' }}>ADVANCED ANALYTICS BY ASAD LEE</p>
                    </header>

                    {/* Search Area */}
                    <div className="tilt-card" style={{ marginBottom: '40px', display: 'flex', gap: '15px', alignItems: 'center' }}>
                        <i className='bx bx-at' style={{ fontSize: '24px', color: 'var(--primary)' }}></i>
                        <input 
                            type="text" 
                            placeholder="Enter Instagram Username..."
                            value={username}
                            onChange={(e) => setUsername(e.target.value)}
                            style={{ flex: 1, background: 'transparent', border: 'none', color: '#fff', fontSize: '18px', fontFamily: 'var(--font-body)' }}
                        />
                        <button className="cyber-button" onClick={analyze} disabled={loading || !username.trim()}>
                            {loading ? "Scanning..." : "Analyze"}
                        </button>
                    </div>

                    {error && (
                        <div className="tilt-card" style={{ background: 'rgba(255, 23, 68, 0.08)', borderColor: 'rgba(255, 23, 68, 0.25)', color: '#ff6b6b', marginBottom: '20px', textAlign: 'center' }}>
                            {error}
                        </div>
                    )}

                    {loading && (
                        <div className="tilt-card" style={{ marginBottom: '40px', textAlign: 'center' }}>
                            <div style={{ width: '40px', height: '40px', margin: '0 auto 20px', border: '4px solid rgba(34, 211, 238, 0.15)', borderTopColor: 'var(--primary)', borderRadius: '50%', animation: 'spin 1s linear infinite' }} />
                            <p style={{ color: 'var(--primary)', letterSpacing: '1px' }}>Fetching live audit data...</p>
                        </div>
                    )}

                    {data && !loading && (
                        <div className="tilt-card" style={{ marginBottom: '60px' }}>
                            <div style={{ display: 'flex', gap: '20px', alignItems: 'center', flexWrap: 'wrap' }}>
                                <img src={data.profile_pic} alt="Profile" className="profile-img" />
                                <div style={{ flex: 1 }}>
                                    <h2 className="glitch-text" style={{ marginBottom: '8px' }}>@{data.username}</h2>
                                    <p style={{ color: '#94a3b8', marginBottom: '10px' }}>{data.full_name || 'Instagram Profile'}</p>
                                    <span style={{ display: 'inline-flex', alignItems: 'center', gap: '8px', padding: '6px 14px', borderRadius: '999px', background: 'rgba(34, 211, 238, 0.1)', color: 'var(--primary)', fontSize: '12px' }}>
                                        {data.is_private ? 'Private Account' : 'Public Account'}
                                    </span>
                                </div>
                                <div style={{ textAlign: 'center' }}>
                                    <div style={{ fontSize: '32px', fontWeight: 900, color: data.security_metrics.status_color }}>{data.security_metrics.credibility_score}</div>
                                    <div style={{ fontSize: '10px', color: '#94a3b8', letterSpacing: '2px' }}>CREDIBILITY</div>
                                </div>
                            </div>

                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: '15px', marginTop: '30px' }}>
                                <div className="tilt-card" style={{ textAlign: 'center' }}>
                                    <div style={{ fontSize: '20px', fontWeight: 700 }}>{data.stats.followers}</div>
                                    <div style={{ fontSize: '12px', color: '#94a3b8', marginTop: '6px' }}>FOLLOWERS</div>
                                </div>
                                <div className="tilt-card" style={{ textAlign: 'center' }}>
                                    <div style={{ fontSize: '20px', fontWeight: 700 }}>{data.stats.following}</div>
                                    <div style={{ fontSize: '12px', color: '#94a3b8', marginTop: '6px' }}>FOLLOWING</div>
                                </div>
                                <div className="tilt-card" style={{ textAlign: 'center' }}>
                                    <div style={{ fontSize: '20px', fontWeight: 700 }}>{data.stats.posts}</div>
                                    <div style={{ fontSize: '12px', color: '#94a3b8', marginTop: '6px' }}>POSTS</div>
                                </div>
                                <div className="tilt-card" style={{ textAlign: 'center' }}>
                                    <div style={{ fontSize: '20px', fontWeight: 700 }}>{data.stats.engagement_rate}</div>
                                    <div style={{ fontSize: '12px', color: '#94a3b8', marginTop: '6px' }}>ENGAGEMENT</div>
                                </div>
                            </div>

                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '15px', marginTop: '25px' }}>
                                <div className="tilt-card" style={{ textAlign: 'center', padding: '18px' }}>
                                    <div style={{ fontSize: '18px', fontWeight: 700, color: '#00e676' }}>{data.security_metrics.real_followers}</div>
                                    <div style={{ fontSize: '11px', color: '#94a3b8', marginTop: '6px' }}>REAL FOLLOWERS</div>
                                </div>
                                <div className="tilt-card" style={{ textAlign: 'center', padding: '18px' }}>
                                    <div style={{ fontSize: '18px', fontWeight: 700, color: '#ffeb3b' }}>{data.security_metrics.bot_detection}</div>
                                    <div style={{ fontSize: '11px', color: '#94a3b8', marginTop: '6px' }}>BOT RISK</div>
                                </div>
                                <div className="tilt-card" style={{ textAlign: 'center', padding: '18px' }}>
                                    <div style={{ fontSize: '18px', fontWeight: 700, color: data.security_metrics.status_color }}>{data.security_metrics.status}</div>
                                    <div style={{ fontSize: '11px', color: '#94a3b8', marginTop: '6px' }}>AUDIT VERDICT</div>
                                </div>
                            </div>

                            <p style={{ color: '#94a3b8', marginTop: '22px', lineHeight: '1.7' }}>{data.verdict}</p>
                        </div>
                    )}

                    {/* =========================================
                        ASAD LEE'S 3D PORTFOLIO SECTION
                    ========================================= */}
                    <div className="portfolio-section" style={{ marginTop: '100px' }}>
                        <div className="tilt-card" style={{ padding: '50px 30px' }}>
                            <div style={{ display: 'grid', mdGridTemplateColumns: '1fr 2fr', gridTemplateColumns: '1fr', gap: '40px', alignItems: 'center' }}>
                                
                                {/* Image & Socials */}
                                <div style={{ textAlign: 'center' }}>
                                    <img src="https://i.ibb.co/G3fvMHZY/IMG-4886.jpg" alt="Asad Lee" className="profile-img" />
                                    <div style={{ display: 'flex', justifyContent: 'center', gap: '20px', marginTop: '20px' }}>
                                        <a href="https://x.com/asadleo416?s=21" target="_blank" className="social-link"><i className='bx bxl-twitter'></i></a>
                                        <a href="https://www.instagram.com/asadlee24" target="_blank" className="social-link"><i className='bx bxl-instagram'></i></a>
                                        <a href="https://www.linkedin.com/in/asad-ali-3355273ba" target="_blank" className="social-link"><i className='bx bxl-linkedin'></i></a>
                                        <a href="https://wa.me/923400194591" target="_blank" className="social-link"><i className='bx bxl-whatsapp'></i></a>
                                    </div>
                                </div>

                                {/* Content */}
                                <div style={{ textAlign: 'left' }}>
                                    <h2 className="glitch-text" style={{ fontSize: '28px', marginBottom: '15px' }}>Asad Lee</h2>
                                    <p style={{ color: '#94a3b8', lineHeight: '1.7', marginBottom: '20px' }}>
                                        Cyber Security Researcher at **IMSciences Peshawar** and Full-Stack Developer. I specialize in building high-performance 3D web architectures and secure e-commerce systems.
                                    </p>
                                    
                                    <div style={{ marginBottom: '25px' }}>
                                        <span className="skill-badge">Cyber Security</span>
                                        <span className="skill-badge">React & Next.js</span>
                                        <span className="skill-badge">Web3 / DeFi</span>
                                        <span className="skill-badge">Shopify Expert</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <footer style={{ textAlign: 'center', marginTop: '60px', fontSize: '10px', color: '#444', letterSpacing: '2px' }}>
                        © 2026 DEVELOPED BY ASAD LEE | PESHAWAR, PAKISTAN
                    </footer>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
